<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduTrack — My Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px;}
.cal-day-name{text-align:center;font-size:10px;font-family:var(--mono);color:var(--text3);padding:4px 0;text-transform:uppercase;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-family:var(--mono);font-weight:600;position:relative;cursor:default;transition:transform .1s;}
.cal-cell:hover{transform:scale(1.1);}
.cal-cell.present{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,.25);}
.cal-cell.absent{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.cal-cell.empty{opacity:0;}
.cal-cell.other{color:var(--text3);border:1px solid transparent;}
.legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.leg-dot{width:10px;height:10px;border-radius:3px;}
.subject-tab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);font-family:var(--ff);transition:all .15s;background:transparent;color:var(--text2);}
.subject-tab.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(91,141,238,.25);}
</style>
</head>
<body>
<div class="sidebar" id="sidebar-root"></div>
<div class="main">
  <div class="topbar">
    <div><h1>My Attendance</h1><div class="tsub">Track your attendance records</div></div>
  </div>
  <div class="page-body">
    <!-- Summary cards -->
    <div class="cards-grid cards-4 mb24" id="att-cards">
      <div class="stat-card blue"><div class="sc-icon">📅</div><div class="sc-label">Total Classes</div><div class="sc-val" id="c-total">—</div></div>
      <div class="stat-card green"><div class="sc-icon">✓</div><div class="sc-label">Present</div><div class="sc-val" id="c-present">—</div></div>
      <div class="stat-card red"><div class="sc-icon">✕</div><div class="sc-label">Absent</div><div class="sc-val" id="c-absent">—</div></div>
      <div class="stat-card amber" id="c-pct-card"><div class="sc-icon">%</div><div class="sc-label">Attendance %</div><div class="sc-val" id="c-pct">—</div></div>
    </div>

    <div class="cards-grid cards-2 mb24">
      <!-- Calendar -->
      <div class="panel">
        <div class="panel-head">
          <span class="ph-title">Attendance Calendar</span>
          <div style="display:flex;gap:6px;align-items:center;">
            <button class="btn btn-ghost btn-xs" onclick="prevMonth()">‹</button>
            <span id="cal-label" style="font-size:12px;font-family:var(--mono);min-width:90px;text-align:center;"></span>
            <button class="btn btn-ghost btn-xs" onclick="nextMonth()">›</button>
          </div>
        </div>
        <div style="padding:16px;">
          <div class="cal-grid" id="cal-header"></div>
          <div class="cal-grid" id="cal-body"></div>
          <div class="legend">
            <div class="leg-item"><div class="leg-dot" style="background:var(--green);"></div>Present</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--red);"></div>Absent</div>
          </div>
        </div>
      </div>

      <!-- Records table -->
      <div class="panel">
        <div class="panel-head">
          <span class="ph-title">Attendance Log</span>
          <span class="ph-count" id="log-count">0 records</span>
        </div>
        <div id="subject-tabs" style="padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);"></div>
        <div class="tbl-wrap" style="max-height:340px;overflow-y:auto;">
          <table>
            <thead><tr><th>Date</th><th>Subject</th><th>Status</th></tr></thead>
            <tbody id="log-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/shared.js"></script>
<script>
(function(){
  const session = authGuard('student');
  if(!session) return;
  renderSidebar('my-attendance');

  let records=[], calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
  let activeSubject='All';

  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('cal-header').innerHTML=days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  function buildCalendar(){
    const label=new Date(calYear,calMonth,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    document.getElementById('cal-label').textContent=label;
    const first=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const cells=[];
    for(let i=0;i<first;i++) cells.push(`<div class="cal-cell empty"></div>`);
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayRecs=records.filter(r=>r.date===dateStr&&(activeSubject==='All'||r.subject===activeSubject));
      let cls='other';
      if(dayRecs.length){
        const hasPresent=dayRecs.some(r=>r.status==='present');
        const hasAbsent=dayRecs.some(r=>r.status==='absent');
        cls=hasPresent&&!hasAbsent?'present':hasAbsent&&!hasPresent?'absent':'present';
      }
      cells.push(`<div class="cal-cell ${cls}" title="${dateStr}">${d}</div>`);
    }
    document.getElementById('cal-body').innerHTML=cells.join('');
  }

  window.prevMonth=function(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;buildCalendar();}
  window.nextMonth=function(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;buildCalendar();}

  function buildSubjectTabs(){
    const subjects=['All',...new Set(records.map(r=>r.subject).filter(Boolean))];
    document.getElementById('subject-tabs').innerHTML=subjects.map(s=>`
      <button class="subject-tab ${s===activeSubject?'active':''}" onclick="setSubject('${s}')">${s||'General'}</button>`).join('');
  }

  window.setSubject=function(s){activeSubject=s;buildSubjectTabs();buildCalendar();buildLog();}

  function buildLog(){
    const filtered=activeSubject==='All'?records:records.filter(r=>r.subject===activeSubject);
    const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('log-count').textContent=sorted.length+' records';
    const tbody=document.getElementById('log-body');
    if(!sorted.length){tbody.innerHTML=emptyState('No attendance records');return;}
    tbody.innerHTML=sorted.map(r=>`
      <tr>
        <td class="td-mono">${r.date}</td>
        <td>${r.subject||'General'}</td>
        <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:${r.status==='present'?'var(--green)':'var(--red)'};">
          ${r.status==='present'?'<span class="present-dot"></span>':'<span class="absent-dot"></span>'}
          ${r.status.charAt(0).toUpperCase()+r.status.slice(1)}
        </span></td>
      </tr>`).join('');
  }

  async function load(){
    const r=await GET(API.students+'/'+session.user.id);
    if(!r.success) return;
    const s=r.data;
    records=s.attendanceRecords||[];
    const total=records.length;
    const present=records.filter(r=>r.status==='present').length;
    const absent=total-present;
    const pct=total?Math.round(present/total*100):0;
    document.getElementById('c-total').textContent=total;
    document.getElementById('c-present').textContent=present;
    document.getElementById('c-absent').textContent=absent;
    document.getElementById('c-pct').textContent=pct+'%';
    // Change card color based on %
    document.getElementById('c-pct-card').className='stat-card '+(pct<75?'red':'green');
    buildSubjectTabs();
    buildCalendar();
    buildLog();
  }
  load();
})();
</script>
</body>
</html>
