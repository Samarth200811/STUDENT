<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduTrack — My Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.profile-header{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border2);border-radius:14px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:22px;}
.big-avatar{width:60px;height:60px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;}
.profile-name{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px;}
.profile-sub{font-size:12px;color:var(--text2);font-family:var(--mono);}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
.info-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;}
.info-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.info-val{font-size:13.5px;font-weight:600;}
</style>
</head>
<body>
<div class="sidebar" id="sidebar-root"></div>
<div class="main">
  <div class="topbar">
    <div><h1>My Profile</h1><div class="tsub">Your student dashboard</div></div>
    <span class="tag" id="date-tag">—</span>
  </div>
  <div class="page-body" id="portal-body">
    <div style="color:var(--text3);text-align:center;padding:40px;">Loading…</div>
  </div>
</div>
<script src="../js/shared.js"></script>
<script>
(function(){
  const session = authGuard('student');
  if(!session) return;
  renderSidebar('student-portal');
  document.getElementById('date-tag').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

  async function load() {
    const r = await GET(API.students+'/'+session.user.id);
    if(!r.success){document.getElementById('portal-body').innerHTML='<div style="color:var(--red);">Failed to load profile.</div>';return;}
    const s=r.data;
    const initials=(s.name||'??').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('portal-body').innerHTML=`
      <div class="profile-header">
        <div class="big-avatar">${initials}</div>
        <div>
          <div class="profile-name">${s.name}</div>
          <div class="profile-sub">${s.rollNumber} · ${s.course}</div>
          <div style="margin-top:8px;display:flex;gap:6px;">${gradeBadge(s.grade||'C')}<span class="tag">${s.email}</span></div>
        </div>
      </div>

      <div class="cards-grid cards-3 mb24">
        <div class="stat-card blue"><div class="sc-icon">📊</div><div class="sc-label">Overall Marks</div><div class="sc-val">${s.marks}%</div><div class="sc-sub">Grade: ${s.grade||'N/A'}</div></div>
        <div class="stat-card ${s.attendance<75?'red':'green'}"><div class="sc-icon">📅</div><div class="sc-label">Attendance</div><div class="sc-val">${s.attendance}%</div><div class="sc-sub">${s.attendance<75?'⚠ Below 75%':'Good standing'}</div></div>
        <div class="stat-card purple"><div class="sc-icon">📚</div><div class="sc-label">Subjects Tracked</div><div class="sc-val">${(s.marksRecords||[]).length}</div><div class="sc-sub">Exam records</div></div>
      </div>

      <div class="info-grid">
        ${[['Full Name',s.name],['Roll Number',s.rollNumber],['Email',s.email],['Course',s.course],['Phone',s.phone||'—'],['Address',s.address||'—']].map(([l,v])=>`
          <div class="info-card"><div class="info-label">${l}</div><div class="info-val">${v}</div></div>`).join('')}
      </div>

      ${(s.marksRecords||[]).length?`
        <div class="panel">
          <div class="panel-head"><span class="ph-title">Subject-wise Marks</span></div>
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Subject</th><th>Exam</th><th>Score</th><th>%</th><th>Date</th></tr></thead>
              <tbody>${s.marksRecords.map(m=>`
                <tr>
                  <td class="td-name">${m.subject}</td>
                  <td>${m.examType}</td>
                  <td class="td-mono">${m.score}/${m.maxScore}</td>
                  <td>${gradeBadge(m.score/m.maxScore>=.8?'A':m.score/m.maxScore>=.6?'B':'C')}</td>
                  <td class="td-mono">${m.date||'—'}</td>
                </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>`:``}
    `;
  }
  load();
})();
</script>
</body>
</html>
